<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CSS Animations Practice</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  padding: 30px;
}

section {
  margin-bottom: 40px;
}

/* 1. Плавная кнопка */
.btn {
  padding: 12px 24px;
  background: #3498db;
  border: none;
  color: white;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.btn:hover {
  background: #2ecc71;
  transform: scale(1.1);
}

/* 2. Fade-in блок */
.fade {
  width: 200px;
  height: 100px;
  background: #444;
  animation: fadeIn 1.5s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* 3. Движение по горизонтали */
.move {
  width: 50px;
  height: 50px;
  background: red;
  animation: moveX 2s infinite alternate linear;
}
@keyframes moveX {
  from { transform: translateX(0); }
  to   { transform: translateX(300px); }
}

/* 4. Прыгающий мяч */
.ball {
  width: 40px;
  height: 40px;
  background: orange;
  border-radius: 50%;
  animation: jump 1s infinite ease-in-out;
}
@keyframes jump {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-80px); }
}

/* 5. Вращающийся лоадер */
.loader {
  width: 40px;
  height: 40px;
  border: 4px solid #555;
  border-top: 4px solid white;
  border-radius: 50%;
  animation: spin 1s infinite linear;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 6. Пульсация кнопки */
.pulse {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* 7. Меню (checkbox hack) */
#menu-toggle { display: none; }

.menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 200px;
  height: 100%;
  background: #222;
  transform: translateX(-100%);
  transition: transform 0.4s;
  padding: 20px;
}
#menu-toggle:checked + .menu {
  transform: translateX(0);
}

/* 8. Карточка hover */
.card {
  width: 200px;
  padding: 20px;
  background: #333;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}

/* 9. Печатающийся текст */
.typing {
  width: 0;
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid white;
  animation: typing 3s steps(20) forwards;
}
@keyframes typing {
  to { width: 220px; }
}

/* 10. Лоадер из 3 точек */
.dots span {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  margin: 0 4px;
  animation: dotJump 1s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotJump {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}
</style>
</head>

<body>

<section>
<h3>1. Плавная кнопка</h3>
<button class="btn">Наведи</button>
</section>

<section>
<h3>2. Fade-in блок</h3>
<div class="fade"></div>
</section>

<section>
<h3>3. Движение</h3>
<div class="move"></div>
</section>

<section>
<h3>4. Прыгающий мяч</h3>
<div class="ball"></div>
</section>

<section>
<h3>5. Лоадер</h3>
<div class="loader"></div>
</section>

<section>
<h3>6. Пульсация</h3>
<button class="btn pulse">Pulse</button>
</section>

<section>
<h3>7. Меню</h3>
<label for="menu-toggle" class="btn">Открыть меню</label>
<input type="checkbox" id="menu-toggle">
<div class="menu">
  <p>Меню</p>
  <p>Пункт 1</p>
  <p>Пункт 2</p>
</div>
</section>

<section>
<h3>8. Карточка</h3>
<div class="card">Hover me</div>
</section>

<section>
<h3>9. Typing текст</h3>
<div class="typing">Привет, CSS анимации!</div>
</section>

<section>
<h3>10. 3 точки</h3>
<div class="dots">
  <span></span><span></span><span></span>
</div>
</section>

</body>
</html>
